name: Build APK Stable FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # =====================================================
      # CODE SOURCE
      # =====================================================
      - uses: actions/checkout@v4

      # =====================================================
      # DEPENDENCIES SYSTEM
      # =====================================================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip python3-setuptools python3-wheel \
            autoconf automake libtool-bin libtool \
            pkg-config zlib1g-dev libffi-dev \
            libssl-dev cmake

      # =====================================================
      # PYTHON TOOLS
      # =====================================================
      - name: Install Buildozer
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0 cython==0.29.36

      # =====================================================
      # ANDROID SDK FIX (IMPORTANT)
      # =====================================================
      - name: Fix Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          yes | sudo sdkmanager --licenses || true

      # =====================================================
      # CLEAN OLD BUILD
      # =====================================================
      - name: Clean build
        run: |
          rm -rf .buildozer
          rm -rf bin

      # =====================================================
      # INIT BUILDOZER
      # =====================================================
      - name: Init Buildozer
        run: |
          buildozer init || true

      # =====================================================
      # BUILD APK (STABLE MODE)
      # =====================================================
      - name: Build APK
        run: |
          export ANDROIDAPI=33
          export ANDROIDMINAPI=21
          yes | buildozer android clean
          yes | buildozer -v android debug

      # =====================================================
      # UPLOAD APK
      # =====================================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GestionColisAPK
          path: bin/*.apk
