name: Build APK

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      sudo apt update
      sudo apt install -y \
        git \
        zip \
        unzip \
        openjdk-17-jdk \
        python3-pip \
        autoconf \
        automake \
        libtool \
        pkg-config \
        zlib1g-dev \
        libffi-dev \
        libssl-dev

  - name: Install Python tools
    run: |
      python3 -m pip install --upgrade pip
      python3 -m pip install buildozer==1.5.0
      python3 -m pip install cython==0.29.36
      python3 -m pip install python-for-android

  - name: Build APK
    run: |
      buildozer -v android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: apk
      path: bin/*.apk
